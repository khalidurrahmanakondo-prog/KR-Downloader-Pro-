<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KR Downloader Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0b0e14; --card: #1a1d21; --text: #ffffff; --grad: linear-gradient(45deg, #ff0055, #ffdd00, #00ffcc, #3366ff, #cc00ff); }
        .light-mode { --bg: #f5f5f5; --card: #ffffff; --text: #000000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; transition: 0.3s; overflow-x: hidden; }
        .brand-name { font-size: 20px; font-weight: 900; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% auto; animation: wave 3s linear infinite; }
        @keyframes wave { to { background-position: 200% center; } }
        .v-item { display: flex; background: var(--card); border: 1px solid #333; border-radius: 12px; margin: 10px; padding: 10px; align-items: center; cursor: pointer; }
        .v-thumb { width: 100px; height: 60px; background: #000; border-radius: 8px; margin-right: 15px; overflow: hidden; flex-shrink: 0; }
        .set-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222; cursor: pointer; color: var(--text); }
        .set-item i { width: 30px; color: #00ffcc; margin-right: 10px; font-size: 18px; }
        nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-btn { color: #888; text-align: center; font-size: 11px; cursor: pointer; }
        .nav-btn.active { color: #fff; }
        .nav-btn i { font-size: 20px; margin-bottom: 3px; display: block; }
        .page { display: none; } .active-page { display: block; }
        #bar-container { display: none; margin-top: 20px; text-align: center; }
        .progress-bar { width: 100%; height: 8px; background: #222; border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--grad); transition: 0.4s; }
    </style>
</head>
<body>

<div id="home" class="page active-page">
    <header style="text-align:center; padding:15px; background:var(--card);"><span class="brand-name">KR DOWNLOADER PRO</span></header>
    <div style="padding:40px 20px;">
        <input type="text" id="url-input" style="width:100%; padding:15px; background:var(--card); color:#fff; border:1px solid #444; border-radius:10px; box-sizing:border-box;" placeholder="লিঙ্ক এখানে পেস্ট করুন...">
        <button onclick="startDownload()" style="width:100%; margin-top:10px; padding:15px; background:var(--grad); color:#fff; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">ডাউনলোড করুন</button>
        
        <div id="bar-container">
            <p id="status-msg">প্রসেস হচ্ছে...</p>
            <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
            <a id="save-btn" style="display:none; margin-top:15px; width:100%; padding:12px; background:#00ffcc; color:#000; border-radius:8px; font-weight:bold; text-decoration:none; display:inline-block; text-align:center;" href="#" download="video.mp4">গ্যালারিতে সেভ করুন</a>
        </div>
    </div>
</div>

<div id="videos" class="page">
    <header style="text-align:center; padding:15px; background:var(--card);"><span class="brand-name">ডাউনলোড করা ভিডিও</span></header>
    <div id="video-list"></div>
</div>

<div id="settings" class="page">
    <header style="text-align:center; padding:15px; background:var(--card);"><span class="brand-name">সেটিংস</span></header>
    <div class="set-item" onclick="window.open('https://t.me/krtakaincomeofficialchannel')"><i class="fab fa-telegram-plane"></i>টেলিগ্রাম চ্যানেল</div>
    <div class="set-item" onclick="document.body.classList.toggle('light-mode')"><i class="fas fa-adjust"></i>থিম পরিবর্তন</div>
</div>

<nav>
    <div class="nav-btn active" onclick="showTab('home', this)"><i class="fas fa-home"></i>হোম</div>
    <div class="nav-btn" onclick="showTab('videos', this)"><i class="fas fa-play-circle"></i>ভিডিও</div>
    <div class="nav-btn" onclick="showTab('settings', this)"><i class="fas fa-cog"></i>সেটিংস</div>
</nav>

<script>
    let vHistory = JSON.parse(localStorage.getItem('kr_vids') || '[]');

    function showTab(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active-page');
        el.classList.add('active');
    }

    async function startDownload() {
        const link = document.getElementById('url-input').value;
        if(!link) return alert("লিঙ্ক দিন!");

        // Render-এ ডিপ্লয় করার পর আপনার URL এখানে দিবেন
        const baseUrl = "https://kr-downloader-pro.onrender.com"; 

        document.getElementById('bar-container').style.display = 'block';
        document.getElementById('save-btn').style.display = 'none';
        updateBar(40, "সার্ভার চেক করা হচ্ছে...");

        try {
            const api = `${baseUrl}/download?url=${encodeURIComponent(link)}`;
            const res = await fetch(api);
            const data = await res.json();

            if(data.download_url) {
                updateBar(100, "ভিডিও রেডি!");
                
                // প্রক্সি ইউআরএল তৈরি
                const proxyUrl = `${baseUrl}/proxy?url=${encodeURIComponent(data.download_url)}`;
                
                const saveBtn = document.getElementById('save-btn');
                saveBtn.href = proxyUrl;
                saveBtn.style.display = 'block';

                // হিস্ট্রি সেভ
                vHistory.unshift({ src: link, date: new Date().toLocaleString() });
                localStorage.setItem('kr_vids', JSON.stringify(vHistory.slice(0, 10)));
                loadList();
            } else { throw new Error(); }
        } catch(e) {
            alert("ডাউনলোড ব্যর্থ! লিঙ্কে সমস্যা বা সার্ভার ব্যস্ত।");
            document.getElementById('bar-container').style.display = 'none';
        }
    }

    function updateBar(p, t) {
        document.getElementById('fill').style.width = p + "%";
        document.getElementById('status-msg').innerText = t;
    }

    function loadList() {
        document.getElementById('video-list').innerHTML = vHistory.map(v => `
            <div class="v-item">
                <div class="v-thumb" style="background:#333; display:flex; align-items:center; justify-content:center;"><i class="fas fa-video"></i></div>
                <div class="v-info">
                    <h4 style="margin:0; font-size:14px;">ভিডিও ফাইল</h4>
                    <p style="margin:5px 0 0; font-size:11px; color:#888;">${v.date}</p>
                </div>
            </div>
        `).join('');
    }
    loadList();
</script>
</body>
</html>
